name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: verify (node 24)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      # Node 24 = current Active LTS (Krypton). Older runtimes (22 / Jod) are
      # dropped because dragging along an older runtime widens the supply-chain
      # attack surface without buying us anything for a green-field PoC. The
      # Current line (25) is also skipped: it EOLs 2026-10 and production users
      # are expected to run the LTS, so the extra matrix arm was costing CI
      # time without protecting any real consumer.
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

  gui-e2e:
    name: gui e2e (node 24)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @pwqa-e2e/workbench-gui exec playwright install chromium --with-deps

      - name: Start local workbench
        env:
          WORKBENCH_ALLOWED_ROOTS: ${{ github.workspace }}/tests/fixtures
        run: |
          pnpm dev:agent > /tmp/playwright-workbench-agent.log 2>&1 &
          pnpm dev:web > /tmp/playwright-workbench-web.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4317/health >/dev/null && curl -fsS http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "::group::agent log"
          cat /tmp/playwright-workbench-agent.log || true
          echo "::endgroup::"
          echo "::group::web log"
          cat /tmp/playwright-workbench-web.log || true
          echo "::endgroup::"
          exit 1

      - name: GUI E2E
        env:
          WORKBENCH_URL: http://127.0.0.1:5173
          FIXTURE_ROOT: ${{ github.workspace }}/tests/fixtures/sample-pw-project
        run: pnpm e2e

      # §1.2 E2E: drive the full Phase 1.2 Allure pipeline end-to-end
      # against the sample-pw-allure-project fixture (open project →
      # inventory → run → wait for QMO summary outcome). Verifies that
      # the workbench actually works against an Allure-enabled project
      # in this repo (the "ワークベンチ動作確認" the user asked for).
      - name: GUI E2E (Allure pipeline)
        env:
          WORKBENCH_URL: http://127.0.0.1:5173
          ALLURE_FIXTURE_ROOT: ${{ github.workspace }}/tests/fixtures/sample-pw-allure-project
        run: pnpm e2e:allure

      - name: Upload GUI E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-e2e-artifacts
          path: |
            e2e/_artifacts
            e2e/test-results
            /tmp/playwright-workbench-agent.log
            /tmp/playwright-workbench-web.log
          if-no-files-found: ignore
