name: 機能リクエスト
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな問題を解決したいですか？
      placeholder: "例: 〇〇する際に△△が不便で..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような解決策をイメージしていますか？
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した方法があれば記載してください
    validations:
      required: false
